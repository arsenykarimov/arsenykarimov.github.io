<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>Work | Arseny Karimov</title>

  <link rel="stylesheet" href="style.css?v=10">
  <link rel="stylesheet" href="work.css?v=4">
</head>

<body class="work-page">

  <section class="work-viewer">

    <video
  class="work-loop"
  autoplay
  muted
  loop
  playsinline
  preload="auto"
>

</video>

    <div class="work-dim"></div>

    <div class="work-title">

  <h1 id="project-title"></h1>

  <p id="project-subtitle"></p>

</div>

    <button class="work-arrow work-arrow-left" type="button" aria-label="Previous project"></button>
    <button class="work-arrow work-arrow-right" type="button" aria-label="Next project"></button>

    <button class="work-play" type="button" aria-label="Play trailer">
      <span></span>
    </button>

  </section>

  <div class="work-player">
    <button class="work-close" type="button" aria-label="Close player">×</button>

    <video class="trailer-video" controls playsinline>

</video>
  </div>

  <script src="projects.js?v=1"></script>
  <script src="work.js?v=5"></script>

</body>

</html>
