<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>Work | Arseny Karimov</title>

  <link rel="stylesheet" href="style.css?v=13">
  <link rel="stylesheet" href="work.css?v=12">
</head>

<body class="work-page">

  <section class="work-viewer">

    <img class="work-poster poster-a active" alt="">
    <img class="work-poster poster-b" alt="">

    <video
      class="work-loop"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    ></video>

    <div class="work-dim"></div>

    <button class="work-menu-button" type="button" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="work-menu-overlay">
      <div class="work-menu-links">
        <a href="index.html">HOME</a>
        <a href="#">SHOWREEL</a>
        <a href="#">STILLS</a>
        <a href="#">BACKSTAGE</a>
        <a href="#">ABOUT</a>
        <a href="#">CONTACT</a>
      </div>
    </nav>

    <div class="work-title">
      <h1 id="project-title"></h1>
      <p id="project-subtitle"></p>
    </div>

    <button class="work-arrow work-arrow-left" type="button" aria-label="Previous project"></button>
    <button class="work-arrow work-arrow-right" type="button" aria-label="Next project"></button>

    <button class="work-play" type="button" aria-label="Play trailer">
      <span></span>
    </button>

  </section>

  <div class="work-player">
    <button class="work-close" type="button" aria-label="Close player">×</button>
    <video class="trailer-video" controls playsinline></video>
  </div>

  <script src="projects.js?v=6"></script>
  <script src="work.js?v=16"></script>

</body>

</html>
