<!DOCTYPE html>
<html lang="ru">

<head>

  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, viewport-fit=cover"
>

  <title>Работы | Арсений Каримов</title>

  <link rel="stylesheet" href="../style.css?v=61">
  <link rel="stylesheet" href="../work.css?v=49">
  <link rel="stylesheet" href="../ru-style.css?v=5">
</head>

<body class="work-page">

<a class="site-brand-small" href="work.html">
  <span>АРСЕНИЙ<span class="site-brand-gap"></span>КАРИМОВ</span>
  <small>ОПЕРАТОР-ПОСТАНОВЩИК</small>
</a>

<section class="work-viewer">

  <img class="work-poster poster-a active" alt="">
  <img class="work-poster poster-b" alt="">

  <video
    class="work-loop"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
  ></video>

  <a class="lang-switch" href="../work.html">ENG</a>

  <button class="menu-button" type="button" aria-label="Меню">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="menu-overlay">
    <div class="menu-links">
      <a href="index.html">ГЛАВНАЯ</a>
      <a class="active" href="work.html" aria-current="page">РАБОТЫ</a>
      <a href="showreel.html">ШОУРИЛ</a>
      <a href="contact.html">КОНТАКТЫ</a>
    </div>
  </nav>

  <div class="work-title title-current">
    <h1 id="project-title"></h1>
    <p id="project-subtitle"></p>
  </div>

  <div class="work-title title-next">
    <h1 id="next-project-title"></h1>
    <p id="next-project-subtitle"></p>
  </div>
  
  <div class="work-counter" aria-live="polite">
  <span id="project-counter">01/04</span>
</div>

  <button class="work-arrow work-arrow-left" type="button" aria-label="Предыдущий проект"></button>
  <button class="work-arrow work-arrow-right" type="button" aria-label="Следующий проект"></button>

  <button class="work-play" type="button" aria-label="Смотреть трейлер">
    <span></span>
  </button>

</section>

<div class="work-player">
  <button class="work-close" type="button" aria-label="Закрыть">×</button>
  <video
  class="trailer-video"
  controls
  controlsList="nodownload"
  disablePictureInPicture
  playsinline
></video>
</div>

<script src="projects.js?v=2"></script>
<script src="../work.js?v=43"></script>

</body>
</html>
